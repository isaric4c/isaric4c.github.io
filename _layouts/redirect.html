<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title>
    {% assign redirect_target = page.redirect.to | default: page.redirect %}
    {% if redirect_target %}<meta http-equiv="refresh" content="0; url={{ redirect_target }}">{% endif %}
</head>
<body>
    <h1>{{ page.title }}</h1>
    {% if redirect_target %}<h3> Redirecting to <a href="{{ redirect_target }}">{{ redirect_target }}</a> ...</h3>{% endif %}
    {{ content }}
</body>
</html>
